syntax = "proto3";

package transaction;
option go_package = "github.com/PayGidi/TransactionService/proto;pb";

service UserService {
  rpc GetUser (UserRequest) returns (UserResponse);
}

message UserRequest {
  string user_id = 1;
}

message UserResponse {
  string user_id = 1;
  string name = 2;
  string email = 3;
}