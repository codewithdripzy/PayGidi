services:
  gateway:
    container_name: paygidi-gateway
    image: ${REGISTRY:-ghcr.io/codewithdripzy}/paygidi-gateway:latest
    build:
      context: .
      dockerfile: ./services/gateway/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - GODEBUG=netdns=go
      - ACCOUNT_SERVICE_URL=http://account-service:8080
      - WALLET_SERVICE_URL=http://wallet-service:8082
      - TRANSACTION_SERVICE_URL=http://transaction-service:8081
      - AI_SERVICE_URL=http://ai-service:8083
      - NOTIFICATION_SERVICE_URL=http://notification-service:8080
    depends_on:
      account-service:
        condition: service_healthy
      wallet-service:
        condition: service_healthy
      transaction-service:
        condition: service_healthy
      ai-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
    networks:
      - paygidi-network

  account-service:
    container_name: paygidi-account
    image: ${REGISTRY:-ghcr.io/codewithdripzy}/paygidi-account:latest
    build:
      context: .
      dockerfile: ./services/account/Dockerfile
    expose:
      - "8080"
      - "50051"
    env_file:
      - ./services/account/.env.production
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      - postgres
    networks:
      - paygidi-network

  wallet-service:
    container_name: paygidi-wallet
    image: ${REGISTRY:-ghcr.io/codewithdripzy}/paygidi-wallet:latest
    build:
      context: .
      dockerfile: ./services/wallet/Dockerfile
    expose:
      - "8082"
      - "50053"
    env_file:
      - ./services/wallet/.env.production
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8082/docs/index.html"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      - postgres
    networks:
      - paygidi-network

  transaction-service:
    container_name: paygidi-transaction
    image: ${REGISTRY:-ghcr.io/codewithdripzy}/paygidi-transaction:latest
    build:
      context: .
      dockerfile: ./services/transaction/Dockerfile
    expose:
      - "8081"
      - "50055"
    env_file:
      - ./services/transaction/.env.production
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/docs/index.html"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      - postgres
    networks:
      - paygidi-network

  ai-service:
    container_name: paygidi-ai
    image: ${REGISTRY:-ghcr.io/codewithdripzy}/paygidi-ai:latest
    build:
      context: .
      dockerfile: ./services/ai/Dockerfile
    expose:
      - "8083"
      - "50054"
    env_file:
      - ./services/ai/.env.production
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8083/api/v1/kyb/status"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      - postgres
    networks:
      - paygidi-network

  notification-service:
    container_name: paygidi-notification
    image: ${REGISTRY:-ghcr.io/codewithdripzy}/paygidi-notification:latest
    build:
      context: .
      dockerfile: ./services/notification/Dockerfile
    expose:
      - "8080"
      - "50052"
    env_file:
      - ./services/notification/.env.production
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/docs/index.html"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      - postgres
    networks:
      - paygidi-network

  postgres:
    container_name: paygidi-postgres
    image: postgres:16
    env_file:
      - ./services/postgres/.env.production
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paygidi_api -d paygidi"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - paygidi-network

networks:
  paygidi-network:
    driver: bridge

volumes:
  postgres_data:
