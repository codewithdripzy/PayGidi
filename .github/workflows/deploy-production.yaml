name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build and Push Images
        env:
          DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
        run: |
          # Build each service
          docker build -t ${DOCKER_HUB_USERNAME}/paygidi-gateway:latest -f ./services/gateway/Dockerfile .
          docker build -t ${DOCKER_HUB_USERNAME}/paygidi-account:latest -f ./services/account/Dockerfile .
          docker build -t ${DOCKER_HUB_USERNAME}/paygidi-wallet:latest -f ./services/wallet/Dockerfile .
          docker build -t ${DOCKER_HUB_USERNAME}/paygidi-transaction:latest -f ./services/transaction/Dockerfile .
          docker build -t ${DOCKER_HUB_USERNAME}/paygidi-ai:latest -f ./services/ai/Dockerfile .
          docker build -t ${DOCKER_HUB_USERNAME}/paygidi-notification:latest -f ./services/notification/Dockerfile .

          # Push images
          docker push ${DOCKER_HUB_USERNAME}/paygidi-gateway:latest
          docker push ${DOCKER_HUB_USERNAME}/paygidi-account:latest
          docker push ${DOCKER_HUB_USERNAME}/paygidi-wallet:latest
          docker push ${DOCKER_HUB_USERNAME}/paygidi-transaction:latest
          docker push ${DOCKER_HUB_USERNAME}/paygidi-ai:latest
          docker push ${DOCKER_HUB_USERNAME}/paygidi-notification:latest

      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_KEY }}

      - name: Deploy to EC2
        env:
          DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
        run: |
          ssh \
            -o StrictHostKeyChecking=no \
            -o ServerAliveInterval=60 \
            -o ServerAliveCountMax=10 \
            ubuntu@${{ secrets.EC2_HOST }} << 'EOF'

            set -euxo pipefail

            # Install Docker if missing
            if ! command -v docker &> /dev/null; then
              echo "Installing Docker..."
              sudo apt-get update
              sudo apt-get install -y docker.io docker-compose-v2
              sudo systemctl enable docker
              sudo systemctl start docker
              sudo usermod -aG docker ubuntu
            fi

            # Ensure repo exists
            mkdir -p /home/ubuntu/paygidi
            cd /home/ubuntu/paygidi

            # Clone if first deploy
            if [ ! -d ".git" ]; then
              git clone git@github.com:${{ github.repository }}.git .
            fi

            # Pull latest code (just for the docker-compose file)
            git fetch origin
            git reset --hard origin/main

            echo "===== DOCKER LOGIN ====="
            echo "${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}" | sudo docker login -u "${{ secrets.DOCKER_HUB_USERNAME }}" --password-stdin

            echo "===== CLEANUP ====="
            sudo docker system prune -f || true

            echo "===== PULLING IMAGES ====="
            export DOCKER_HUB_USERNAME="${{ secrets.DOCKER_HUB_USERNAME }}"
            sudo -E docker compose -f docker-compose.production.yml pull

            echo "===== STARTING ====="
            sudo -E docker compose -f docker-compose.production.yml up -d

            echo "===== CONTAINERS ====="
            sudo docker ps

            echo "===== DONE ====="
          EOF