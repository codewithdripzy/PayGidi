name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Images
        run: |
          # GHCR requires lowercase registry paths
          REGISTRY="ghcr.io/${{ github.repository_owner }}"
          REGISTRY=$(echo "$REGISTRY" | tr '[:upper:]' '[:lower:]')
          
          echo "Building images for ${REGISTRY}..."

          # Build each service
          docker build -t ${REGISTRY}/paygidi-gateway:latest -f ./services/gateway/Dockerfile .
          docker build -t ${REGISTRY}/paygidi-account:latest -f ./services/account/Dockerfile .
          docker build -t ${REGISTRY}/paygidi-wallet:latest -f ./services/wallet/Dockerfile .
          docker build -t ${REGISTRY}/paygidi-transaction:latest -f ./services/transaction/Dockerfile .
          docker build -t ${REGISTRY}/paygidi-ai:latest -f ./services/ai/Dockerfile .
          docker build -t ${REGISTRY}/paygidi-notification:latest -f ./services/notification/Dockerfile .

          # Push images
          docker push ${REGISTRY}/paygidi-gateway:latest
          docker push ${REGISTRY}/paygidi-account:latest
          docker push ${REGISTRY}/paygidi-wallet:latest
          docker push ${REGISTRY}/paygidi-transaction:latest
          docker push ${REGISTRY}/paygidi-ai:latest
          docker push ${REGISTRY}/paygidi-notification:latest

      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_KEY }}

      - name: Deploy to EC2
        run: |
          # Prepare registry path for EC2 env
          REGISTRY="ghcr.io/${{ github.repository_owner }}"
          REGISTRY=$(echo "$REGISTRY" | tr '[:upper:]' '[:lower:]')

          ssh \
            -o StrictHostKeyChecking=no \
            -o ServerAliveInterval=60 \
            -o ServerAliveCountMax=10 \
            ubuntu@${{ secrets.EC2_HOST }} "REGISTRY=${REGISTRY} GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }} GITHUB_ACTOR=${{ github.actor }} bash -s" << 'EOF'

            set -euxo pipefail

            # Install Docker if missing
            if ! command -v docker &> /dev/null; then
              echo "Installing Docker..."
              sudo apt-get update
              sudo apt-get install -y docker.io docker-compose-v2
              sudo systemctl enable docker
              sudo systemctl start docker
              sudo usermod -aG docker ubuntu
            fi

            # Ensure repo exists
            mkdir -p /home/ubuntu/paygidi
            cd /home/ubuntu/paygidi

            # Clone if first deploy
            if [ ! -d ".git" ]; then
              git clone git@github.com:${{ github.repository }}.git .
            fi

            # Pull latest code (just for the docker-compose file)
            git fetch origin
            git reset --hard origin/main

            echo "===== DOCKER LOGIN (GHCR) ====="
            echo "${GITHUB_TOKEN}" | sudo docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin

            echo "===== CLEANUP ====="
            sudo docker system prune -f || true

            echo "===== PULLING IMAGES ====="
            sudo REGISTRY="${REGISTRY}" docker compose -f docker-compose.production.yml pull

            echo "===== STARTING ====="
            sudo REGISTRY="${REGISTRY}" docker compose -f docker-compose.production.yml up -d

            echo "===== CONTAINERS ====="
            sudo docker ps

            echo "===== DONE ====="
          EOF