        - asset: assets/fonts/GoogleSansFlex_24pt-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/GoogleSansFlex_24pt-Bold.ttf
          weight: 700
        - asset: assets/fonts/GoogleSansFlex_24pt-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/GoogleSansFlex_24pt-Black.ttf
